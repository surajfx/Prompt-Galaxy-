<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Galaxy — AI Image Prompts</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08080f;--surface:#0f1020;--card:#11132a;--border:rgba(255,255,255,0.07);--text:#f0f0ff;--muted:#5a5a80;--accent:#FFE234;--v:#b44dff;--b:#00b4ff;--r:#ff3a6e}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:90px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 10% 15%,rgba(180,77,255,0.1) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 90% 25%,rgba(0,180,255,0.1) 0%,transparent 60%);pointer-events:none;z-index:0}

/* NAV */
nav{position:sticky;top:0;z-index:200;height:58px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,15,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--v),var(--b));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff}
.nav-logo-text{font-weight:800;font-size:16px;background:linear-gradient(90deg,var(--v),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* SEARCH */
.search-section{padding:16px 14px 8px;position:relative;z-index:1}
.search-wrap{max-width:480px;width:100%;margin:0 auto;position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.search-input{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(180,77,255,0.2);border-radius:14px;padding:13px 44px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:all 0.2s}
.search-input:focus{border-color:rgba(180,77,255,0.5);background:rgba(255,255,255,0.07)}
.search-input::placeholder{color:var(--muted)}

/* FILTERS */
.filters{display:flex;gap:7px;padding:10px 14px 16px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:1}
.filters::-webkit-scrollbar{display:none}
.filter-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:7px 14px;font-size:12px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;border-radius:100px;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.filter-btn.active{background:linear-gradient(135deg,var(--v),var(--b));color:#fff;border-color:transparent}

/* SECTION */
.section{max-width:1200px;margin:0 auto;padding:0 12px 30px;position:relative;z-index:1}
.section-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px}
.section-title .dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--b));animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3);opacity:0.7}}
.count-badge{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);font-size:10px;font-family:'Space Mono',monospace;padding:3px 9px;border-radius:100px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.28s ease}
.card:hover{transform:translateY(-4px);border-color:rgba(180,77,255,0.3)}
.card-img-wrap{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--surface)}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;display:block}
.card:hover .card-img{transform:scale(1.06)}
.card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px}
.card-tag{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:3px 7px;border-radius:5px;color:var(--accent)}
.card-like{position:absolute;top:8px;right:8px;width:28px;height:28px;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.card-like.liked{background:rgba(255,50,50,0.25);border-color:var(--r)}
.card-body{padding:10px}
.card-title{font-weight:600;font-size:12px;margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;justify-content:space-between}
.card-stats{display:flex;gap:7px;font-size:10px;color:var(--muted);font-family:'Space Mono',monospace}
.view-btn{background:rgba(180,77,255,0.12);border:1px solid rgba(180,77,255,0.3);color:var(--v);padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;border-radius:6px}

/* SKELETON */
.skeleton{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{background:linear-gradient(90deg,var(--surface) 0%,rgba(180,77,255,0.06) 50%,var(--surface) 100%);background-size:250% 100%;animation:shimmer 1.8s ease-in-out infinite}
.sk-img{aspect-ratio:3/4}
.sk-body{padding:10px}
.sk-line{height:11px;border-radius:5px;margin-bottom:7px}
.sk-line.short{width:55%}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);display:none}
.empty-state .icon{font-size:48px;margin-bottom:14px}
.empty-state h3{font-weight:800;font-size:17px;margin-bottom:6px;color:var(--text)}

/* DETAIL OVERLAY */
.detail-overlay{position:fixed;inset:0;z-index:400;background:var(--bg);overflow-y:auto;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1)}
.detail-overlay.open{transform:translateX(0)}
.detail-nav{position:sticky;top:0;z-index:10;height:56px;padding:0 16px;display:flex;align-items:center;gap:12px;background:rgba(8,8,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.detail-back{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.07);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text)}
.detail-nav-title{font-weight:700;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--surface);display:flex;align-items:center;justify-content:center}
.detail-img{width:100%;height:100%;object-fit:cover}
.detail-body{padding:20px 16px 100px}
.detail-cat{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.detail-title{font-weight:800;font-size:22px;line-height:1.3;margin-bottom:6px}
.detail-author{font-size:12px;color:var(--muted);margin-bottom:16px}
.detail-stats{display:flex;gap:16px;margin-bottom:20px;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px}
.detail-stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);font-family:'Space Mono',monospace}
.detail-stat span{color:var(--text);font-weight:600}
.get-prompt-btn{width:100%;padding:18px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:16px;color:var(--text);font-family:'Outfit',sans-serif;font-weight:600;font-size:17px;cursor:pointer;transition:all 0.2s;margin-bottom:14px}
.get-prompt-btn:hover{background:rgba(255,255,255,0.09)}
.detail-actions{display:flex;gap:10px;margin-bottom:24px}
.action-btn{flex:1;padding:14px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.action-btn.liked{background:rgba(255,58,110,0.15);border-color:var(--r);color:var(--r)}
.action-btn.share-btn{background:rgba(0,180,255,0.08);border-color:rgba(0,180,255,0.25);color:var(--b)}
.related-label{font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.related-card{aspect-ratio:3/4;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--card)}
.related-card img{width:100%;height:100%;object-fit:cover}
.related-card-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px}
.more-label{font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;margin-top:8px}

/* PROMPT SHEET */
.sheet-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet-box{background:#13141f;border:1px solid rgba(255,255,255,0.09);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:0 0 36px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);max-height:92vh;overflow-y:auto}
.sheet-overlay.open .sheet-box{transform:translateY(0)}
.sheet-drag{width:40px;height:4px;border-radius:4px;background:rgba(255,255,255,0.12);margin:14px auto 20px}
.sheet-title{font-weight:800;font-size:17px;padding:0 20px 16px}
.pvc{margin:0 16px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px}
.pvc-head{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;font-weight:700;font-size:14px}
.pvc-text{padding:0 16px 14px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);line-height:1.7;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.copy-btn{width:calc(100% - 32px);margin:0 16px 8px;padding:14px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px}
.copy-girl{background:linear-gradient(135deg,#ff4dce,#b44dff);color:#fff}
.copy-boy{background:linear-gradient(135deg,#00b4ff,#b44dff);color:#fff}
.copy-btn.copied{background:linear-gradient(135deg,#00e57d,#00b4ff)}

/* SHARE SHEET */
.share-box{background:#13141f;border:1px solid rgba(255,255,255,0.09);border-radius:24px 24px 0 0;width:100%;max-width:520px;padding:0 20px 36px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1)}
.sheet-overlay.open .share-box{transform:translateY(0)}
.share-apps{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.share-app{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all 0.2s}
.share-app:active{transform:scale(0.92)}
.share-app-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;border:1px solid rgba(255,255,255,0.08)}
.share-app-label{font-size:11px;font-weight:600;color:var(--muted);text-align:center}
.insta-icon{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.wa-icon{background:#25d366}
.tw-icon{background:#000;border-color:rgba(255,255,255,0.15) !important}
.more-icon{background:rgba(255,255,255,0.06)}
.share-link-row{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.share-link-url{flex:1;font-size:12px;font-family:'Space Mono',monospace;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-link-btn{background:var(--accent);color:#000;border:none;padding:7px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.close-btn{width:100%;padding:15px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;color:var(--muted);font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);color:var(--text);padding:12px 20px;border-radius:100px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:all 0.3s;z-index:700;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(11,11,20,0.97);backdrop-filter:blur(28px);border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-around;padding:10px 10px 18px;height:80px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all 0.2s;text-decoration:none;flex:1}
.nav-item-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.25s;color:#555580}
.nav-item.active .nav-item-icon{background:var(--accent);color:#000;box-shadow:0 4px 16px rgba(255,226,52,0.35)}
.nav-item-label{font-size:11px;font-weight:700;color:var(--muted);transition:color 0.2s}
.nav-item.active .nav-item-label{color:var(--accent)}
</style>
</head>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">✦</div>

<div class="search-section">

<div class="section">

<!-- DETAIL PAGE -->

      <div class="detail-stat">❤️ <span id="dLikes">0</span></div>

      <div class="detail-stat">📋 <span id="dCopies">0</span></div>
    </div>
    <button class="get-prompt-btn" id="getPromptBtn">Get Prompt</button>
    <div class="detail-actions">
      <button class="action-btn" id="detailLikeBtn">🤍 Like</button>
      <button class="action-btn share-btn" id="detailShareBtn">🔗 Share</button>
    </div>

    <div class="related-grid" id="relatedGrid"></div>
    <div class="more-label">More Prompts</div>

  </div>
</div>

<!-- PROMPT SHEET -->
<div class="sheet-overlay" id="promptOverlay">

<!-- SHARE SHEET -->

<script>
// ===== FIREBASE INIT =====
firebase.initializeApp({
  apiKey: "AIzaSyDhH_fplGM0SYhXYQyGEmSgsxchuUgi43I",
  authDomain: "surajfx2.firebaseapp.com",
  projectId: "surajfx2",
  storageBucket: "surajfx2.firebasestorage.app",
  messagingSenderId: "386646596801",
  appId: "1:386646596801:web:18bbb81f9d65ab79b28840"
});
var db = firebase.firestore();
var INC = firebase.firestore.FieldValue.increment;

var allPrompts = [];
var currentPrompt = null;

// ===== LOAD PROMPTS =====
function loadPrompts() {
  db.collection('prompts').orderBy('createdAt', 'desc').get()
    .then(function(snap) {
      allPrompts = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); });
      document.getElementById('skeletonGrid').style.display = 'none';
      document.getElementById('promptGrid').style.display = 'grid';
      renderGrid(allPrompts);
      var hash = window.location.hash.replace('#','');
      if (hash) { var p = allPrompts.find(function(x){return x.id===hash;}); if(p) openDetail(p.id); }
    })
    .catch(function(e) {
      console.error('Load error:', e);
      document.getElementById('skeletonGrid').style.display = 'none';
      document.getElementById('promptGrid').style.display = 'grid';
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('countBadge').textContent = 'Error loading';
    });
}

// ===== RENDER GRID =====
function renderGrid(list) {
  var grid = document.getElementById('promptGrid');
  var empty = document.getElementById('emptyState');
  document.getElementById('countBadge').textContent = list.length + ' prompts';
  if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  var liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var isLiked = liked.indexOf(p.id) > -1;
    html += '<div class="card" data-id="' + p.id + '">';
    html += '<div class="card-img-wrap">';
    if (p.imageUrl) {
      html += '<img class="card-img" src="' + p.imageUrl + '" loading="lazy" alt="">';
    } else {
      html += '<div class="card-img-ph" style="background:' + (p.bg||'#11132a') + '">' + (p.emoji||'🎨') + '</div>';
    }
    html += '<div class="card-tag">' + (p.category||'Prompt') + '</div>';
    html += '<div class="card-like ' + (isLiked?'liked':'') + '" data-lid="' + p.id + '">' + (isLiked?'❤️':'🤍') + '</div>';
    html += '</div>';
    html += '<div class="card-body">';
    html += '<div class="card-title">' + p.title + '</div>';
    html += '<div class="card-meta"><div class="card-stats"><span>❤️ ' + (p.likes||0) + '</span><span>📋 ' + (p.copyCount||0) + '</span></div>';
    html += '<div class="view-btn">View</div></div></div></div>';
  }
  grid.innerHTML = html;

  // Attach events
  var cards = grid.querySelectorAll('.card');
  for (var j = 0; j < cards.length; j++) {
    cards[j].addEventListener('click', function(e) {
      if (e.target.classList.contains('card-like') || e.target.closest('.card-like')) return;
      openDetail(this.getAttribute('data-id'));
    });
  }
  var likeBtns = grid.querySelectorAll('.card-like');
  for (var k = 0; k < likeBtns.length; k++) {
    likeBtns[k].addEventListener('click', function(e) {
      e.stopPropagation();
      quickLike(this.getAttribute('data-lid'), this);
    });
  }
}

// ===== OPEN DETAIL =====
function openDetail(id) {
  var p = allPrompts.find(function(x) { return x.id === id; });
  if (!p) return;
  currentPrompt = p;

  document.getElementById('detailNavTitle').textContent = p.title;
  document.getElementById('detailCat').textContent = p.category || '';
  document.getElementById('detailTitle').textContent = p.title;
  document.getElementById('detailAuthor').textContent = 'by ' + (p.author||'Anonymous');
  document.getElementById('dLikes').textContent = p.likes || 0;
  document.getElementById('dViews').textContent = p.views || 0;
  document.getElementById('dCopies').textContent = p.copyCount || 0;

  var img = document.getElementById('detailImg');
  var ph = document.getElementById('detailImgPh');
  if (p.imageUrl) { img.src = p.imageUrl; img.style.display = 'block'; ph.style.display = 'none'; }
  else { img.style.display = 'none'; ph.style.display = 'flex'; ph.textContent = p.emoji||'🎨'; }

  var liked = JSON.parse(localStorage.getItem('likedPrompts')||'[]');
  var lb = document.getElementById('detailLikeBtn');
  if (liked.indexOf(id) > -1) { lb.textContent = '❤️ Unlike'; lb.className = 'action-btn liked'; }
  else { lb.textContent = '🤍 Like'; lb.className = 'action-btn'; }

  // Related
  var related = allPrompts.filter(function(x){ return x.id!==id && x.category===p.category; }).slice(0,3);
  var rhtml = '';
  for (var i=0; i<related.length; i++) {
    var r = related[i];
    rhtml += '<div class="related-card" data-id="' + r.id + '">';
    rhtml += r.imageUrl ? '<img src="' + r.imageUrl + '" loading="lazy">' : '<div class="related-card-ph" style="background:' + (r.bg||'#11132a') + '">' + (r.emoji||'🎨') + '</div>';
    rhtml += '</div>';
  }
  document.getElementById('relatedGrid').innerHTML = rhtml;
  document.querySelectorAll('.related-card').forEach(function(c) {
    c.addEventListener('click', function() { openDetail(this.getAttribute('data-id')); });
  });

  // More prompts
  var more = allPrompts.filter(function(x){ return x.id!==id; }).slice(0,6);
  var mhtml = '';
  for (var j=0; j<more.length; j++) {
    var m = more[j];
    mhtml += '<div class="card" data-id="' + m.id + '" style="opacity:1">';
    mhtml += '<div class="card-img-wrap">';
    mhtml += m.imageUrl ? '<img class="card-img" src="' + m.imageUrl + '" loading="lazy">' : '<div class="card-img-ph" style="background:' + (m.bg||'#11132a') + '">' + (m.emoji||'🎨') + '</div>';
    mhtml += '<div class="card-tag">' + (m.category||'Prompt') + '</div></div>';
    mhtml += '<div class="card-body"><div class="card-title">' + m.title + '</div>';
    mhtml += '<div class="card-meta"><div class="card-stats"><span>❤️ ' + (m.likes||0) + '</span></div><div class="view-btn">View</div></div></div></div>';
  }
  var mg = document.getElementById('moreGrid');
  mg.innerHTML = mhtml;
  mg.querySelectorAll('.card').forEach(function(c) {
    c.addEventListener('click', function() { openDetail(this.getAttribute('data-id')); });
  });

  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({detail: id}, '', '#' + id);

  // Views - once per device
  if (!localStorage.getItem('v_'+id)) {
    localStorage.setItem('v_'+id, '1');
    db.collection('prompts').doc(id).update({views: INC(1)}).catch(function(){});
  }
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
  closePromptSheet();
  closeShareSheet();
  if (window.location.hash) history.pushState(null, '', window.location.pathname);
}

// ===== LIKE =====
function quickLike(id, btn) {
  var liked = JSON.parse(localStorage.getItem('likedPrompts')||'[]');
  var idx = liked.indexOf(id);
  if (idx > -1) {
    liked.splice(idx, 1);
    btn.textContent = '🤍'; btn.classList.remove('liked');
  } else {
    liked.push(id);
    btn.textContent = '❤️'; btn.classList.add('liked');
    db.collection('prompts').doc(id).update({likes: INC(1)}).catch(function(){});
    showToast('Added to Liked ❤️');
  }
  localStorage.setItem('likedPrompts', JSON.stringify(liked));
}

function toggleLike() {
  if (!currentPrompt) return;
  var id = currentPrompt.id;
  var liked = JSON.parse(localStorage.getItem('likedPrompts')||'[]');
  var lb = document.getElementById('detailLikeBtn');
  var idx = liked.indexOf(id);
  if (idx > -1) {
    liked.splice(idx, 1);
    lb.textContent = '🤍 Like'; lb.className = 'action-btn';
    currentPrompt.likes = Math.max(0, (currentPrompt.likes||0) - 1);
  } else {
    liked.push(id);
    lb.textContent = '❤️ Unlike'; lb.className = 'action-btn liked';
    currentPrompt.likes = (currentPrompt.likes||0) + 1;
    db.collection('prompts').doc(id).update({likes: INC(1)}).catch(function(){});
    showToast('Added to Liked ❤️');
  }
  document.getElementById('dLikes').textContent = currentPrompt.likes;
  localStorage.setItem('likedPrompts', JSON.stringify(liked));
}

// ===== PROMPT SHEET =====
function openPromptSheet() {
  if (!currentPrompt) return;
  document.getElementById('girlText').textContent = currentPrompt.girlPrompt || 'No prompt added.';
  document.getElementById('boyText').textContent = currentPrompt.boyPrompt || 'No prompt added.';
  document.getElementById('promptOverlay').classList.add('open');
}
function closePromptSheet() {
  document.getElementById('promptOverlay').classList.remove('open');
}
function copyPrompt(type) {
  if (!currentPrompt) return;
  var text = type === 'girl' ? currentPrompt.girlPrompt : currentPrompt.boyPrompt;
  navigator.clipboard.writeText(text||'').catch(function(){});
  db.collection('prompts').doc(currentPrompt.id).update({copyCount: INC(1)}).catch(function(){});
  var btn = document.getElementById(type==='girl'?'copyGirlBtn':'copyBoyBtn');
  btn.classList.add('copied'); btn.textContent = '✓ Copied!';
  showToast('Prompt copied! 📋');
  var copies = parseInt(document.getElementById('dCopies').textContent)||0;
  document.getElementById('dCopies').textContent = copies + 1;
  setTimeout(function() {
    btn.classList.remove('copied');
    btn.textContent = '📋 Copy ' + (type==='girl'?'Girl':'Boy') + ' Prompt';
  }, 2000);
}

// ===== SHARE =====
function getShareUrl() {
  return window.location.origin + '/index.html#' + (currentPrompt ? currentPrompt.id : '');
}
function openShareSheet() {
  if (!currentPrompt) return;
  document.getElementById('shareLinkText').textContent = getShareUrl();
  document.getElementById('shareOverlay').classList.add('open');
}
function closeShareSheet() {
  document.getElementById('shareOverlay').classList.remove('open');
}

// ===== FILTER =====
function setFilter(filter) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.toggle('active', b.getAttribute('data-filter')===filter); });
  var titles = {all:'All Prompts',trending:'🔥 Trending',cinematic:'🎬 Cinematic','4k':'🌟 4K Image',anime:'🌸 Anime',portrait:'👤 Portrait',fantasy:'🔮 Fantasy',static:'📸 Static'};
  document.getElementById('sectionTitle').textContent = titles[filter]||'All Prompts';
  var filtered;
  if (filter === 'trending') {
    filtered = allPrompts.slice().sort(function(a,b){ return ((b.copyCount||0)+(b.likes||0)*0.5) - ((a.copyCount||0)+(a.likes||0)*0.5); });
  } else if (filter === 'all') {
    filtered = allPrompts;
  } else {
    filtered = allPrompts.filter(function(p){ return (p.category||'').toLowerCase()===filter; });
  }
  renderGrid(filtered);
}

// ===== SEARCH =====
document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.toLowerCase();
  if (!q) { renderGrid(allPrompts); return; }
  var filtered = allPrompts.filter(function(p) {
    return [p.title, p.girlPrompt, p.boyPrompt, p.category].some(function(f){ return (f||'').toLowerCase().indexOf(q)>-1; });
  });
  renderGrid(filtered);
});

// ===== TOAST =====
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ===== EVENT BINDINGS =====
document.getElementById('detailBackBtn').addEventListener('click', closeDetail);
document.getElementById('detailLikeBtn').addEventListener('click', toggleLike);
document.getElementById('detailShareBtn').addEventListener('click', openShareSheet);
document.getElementById('getPromptBtn').addEventListener('click', openPromptSheet);
document.getElementById('copyGirlBtn').addEventListener('click', function(){ copyPrompt('girl'); });
document.getElementById('copyBoyBtn').addEventListener('click', function(){ copyPrompt('boy'); });
document.getElementById('promptOverlay').addEventListener('click', function(e){ if(e.target===this) closePromptSheet(); });
document.getElementById('shareOverlay').addEventListener('click', function(e){ if(e.target===this) closeShareSheet(); });
document.getElementById('shareCloseBtn').addEventListener('click', closeShareSheet);
document.getElementById('copyLinkBtn').addEventListener('click', function(){
  navigator.clipboard.writeText(getShareUrl()).catch(function(){});
  showToast('Link copied! 🔗');
});
document.getElementById('shareInsta').addEventListener('click', function(){
  navigator.clipboard.writeText(getShareUrl()).catch(function(){});
  showToast('Link copied! Paste in Instagram 📸');
  setTimeout(function(){ window.open('https://www.instagram.com','_blank'); }, 300);
  closeShareSheet();
});
document.getElementById('shareWA').addEventListener('click', function(){
  if (!currentPrompt) return;
  window.open('https://wa.me/?text=' + encodeURIComponent(currentPrompt.title + '\n' + getShareUrl()), '_blank');
  closeShareSheet();
});
document.getElementById('shareTW').addEventListener('click', function(){
  if (!currentPrompt) return;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(currentPrompt.title) + '&url=' + encodeURIComponent(getShareUrl()), '_blank');
  closeShareSheet();
});
document.getElementById('shareMore').addEventListener('click', function(){
  if (navigator.share) { navigator.share({title: currentPrompt&&currentPrompt.title, url: getShareUrl()}); }
  else { navigator.clipboard.writeText(getShareUrl()).catch(function(){}); showToast('Link copied! 🔗'); }
  closeShareSheet();
});
document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click', function(){ setFilter(this.getAttribute('data-filter')); });
});
window.addEventListener('popstate', function(){
  if (document.getElementById('detailOverlay').classList.contains('open')) closeDetail();
});

// ===== START =====
loadPrompts();
</script>
</body>
</html>
