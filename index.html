<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Galaxy — AI Image Prompts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08080f;
  --surface: #0f1020;
  --card: #11132a;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0ff;
  --muted: #5a5a80;
  --r: #ff3a6e; --o: #ff8c00; --y: #ffe600;
  --g: #00e57d; --b: #00b4ff; --v: #b44dff; --p: #ff4dce;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh; overflow-x: hidden; padding-bottom: 30px;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 15%, rgba(180,77,255,0.13) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 25%, rgba(0,180,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 50% 80%, rgba(255,58,110,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 70%, rgba(0,229,125,0.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
  animation: meshShift 12s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0.7; transform: scale(1.05); }
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 200;
  height: 62px; padding: 0 18px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(8,8,15,0.85); backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--v), var(--b), var(--g));
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 18px; color: #fff;
  box-shadow: 0 0 18px rgba(180,77,255,0.4); flex-shrink: 0;
}
.nav-logo-text {
  font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 17px;
  background: linear-gradient(90deg, var(--v), var(--b), var(--g));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-upload-btn {
  background: linear-gradient(135deg, var(--v), var(--b));
  color: #fff; border: none; padding: 8px 16px;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 12px;
  cursor: pointer; border-radius: 9px; transition: all 0.2s;
  text-decoration: none; display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 16px rgba(180,77,255,0.3);
}
.nav-upload-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(180,77,255,0.5); }
.nav-auth-btn {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text); padding: 8px 16px;
  font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 13px;
  cursor: pointer; border-radius: 9px; transition: all 0.2s; text-decoration: none;
}
#userAvatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--r), var(--v));
  display: none; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff; cursor: pointer;
  border: 2px solid rgba(255,255,255,0.15);
}

/* SEARCH BAR (no hero, just search) */
.search-section {
  padding: 20px 16px 10px;
  position: relative; z-index: 1;
}
.search-wrap { max-width: 480px; width: 100%; margin: 0 auto; position: relative; }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
.search-clear { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); cursor: pointer; display: none; font-size: 18px; }
.search-input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(180,77,255,0.25); border-radius: 14px;
  padding: 15px 48px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 14px; outline: none; transition: all 0.2s;
}
.search-input:focus { border-color: rgba(180,77,255,0.6); background: rgba(255,255,255,0.07); box-shadow: 0 0 0 4px rgba(180,77,255,0.1); }
.search-input::placeholder { color: var(--muted); }

/* FILTERS */
.filters {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; padding: 14px 16px 20px; position: relative; z-index: 1;
}
.filter-btn {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--muted); padding: 8px 16px; font-size: 12px;
  font-family: 'Outfit', sans-serif; font-weight: 600;
  cursor: pointer; border-radius: 100px; transition: all 0.2s; white-space: nowrap;
}
.filter-btn:nth-child(1).active { background: linear-gradient(135deg,var(--v),var(--b)); color:#fff; border-color:transparent; box-shadow:0 4px 16px rgba(180,77,255,0.4); }
.filter-btn:nth-child(2).active { background: linear-gradient(135deg,var(--r),var(--o)); color:#fff; border-color:transparent; box-shadow:0 4px 16px rgba(255,58,110,0.4); }
.filter-btn:nth-child(3).active { background: linear-gradient(135deg,var(--b),var(--g)); color:#000; border-color:transparent; box-shadow:0 4px 16px rgba(0,180,255,0.4); }
.filter-btn:nth-child(4).active { background: linear-gradient(135deg,var(--g),var(--y)); color:#000; border-color:transparent; box-shadow:0 4px 16px rgba(0,229,125,0.4); }
.filter-btn:nth-child(5).active { background: linear-gradient(135deg,var(--p),var(--v)); color:#fff; border-color:transparent; box-shadow:0 4px 16px rgba(255,77,206,0.4); }
.filter-btn:nth-child(6).active { background: linear-gradient(135deg,var(--o),var(--r)); color:#fff; border-color:transparent; box-shadow:0 4px 16px rgba(255,140,0,0.4); }
.filter-btn:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: var(--text); }

/* SECTION */
.section { max-width: 1200px; margin: 0 auto; padding: 0 14px 40px; position: relative; z-index: 1; }
.section-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.section-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 8px; }
.section-title .dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: linear-gradient(135deg, var(--v), var(--b));
  box-shadow: 0 0 10px rgba(180,77,255,0.7);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); opacity:0.7; } }
.count-badge {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--muted); font-size: 11px; font-family: 'Space Mono', monospace;
  padding: 4px 10px; border-radius: 100px;
}

/* GRID */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }

/* CARD */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; cursor: pointer;
  transition: all 0.28s ease; opacity: 0;
}
.card.visible { animation: cardPop 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes cardPop { from { opacity:0; transform: translateY(20px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }
.card:hover { transform: translateY(-5px) scale(1.02); border-color: transparent; }
.card:nth-child(3n+1):hover { box-shadow: 0 0 0 1.5px var(--r), 0 16px 40px rgba(255,58,110,0.2); }
.card:nth-child(3n+2):hover { box-shadow: 0 0 0 1.5px var(--b), 0 16px 40px rgba(0,180,255,0.2); }
.card:nth-child(3n):hover   { box-shadow: 0 0 0 1.5px var(--g), 0 16px 40px rgba(0,229,125,0.2); }
.card-img-wrap { position: relative; aspect-ratio: 3/4; overflow: hidden; background: var(--surface); }
.card-img { width:100%; height:100%; object-fit:cover; transition: transform 0.4s ease; display:block; }
.card:hover .card-img { transform: scale(1.07); }
.card-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:42px; }
.card-category-tag {
  position: absolute; top: 9px; left: 9px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
  font-size: 9px; font-family: 'Outfit', sans-serif;
  font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
}
.card:nth-child(3n+1) .card-category-tag { color: var(--r); border-color: rgba(255,58,110,0.3); }
.card:nth-child(3n+2) .card-category-tag { color: var(--b); border-color: rgba(0,180,255,0.3); }
.card:nth-child(3n)   .card-category-tag { color: var(--g); border-color: rgba(0,229,125,0.3); }
.card-like-btn {
  position: absolute; top: 9px; right: 9px; width: 30px; height: 30px;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; transition: all 0.2s;
}
.card-like-btn.liked { background: rgba(255,50,50,0.25); border-color: var(--r); }
.card-body { padding: 12px; }
.card-title { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px; margin-bottom: 9px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; justify-content: space-between; }
.card-stats { display: flex; gap: 8px; font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
.see-prompt-btn {
  background: rgba(180,77,255,0.12); border: 1px solid rgba(180,77,255,0.3);
  color: var(--v); padding: 5px 10px; font-size: 10px;
  font-family: 'Outfit', sans-serif; font-weight: 700; cursor: pointer; border-radius: 6px;
}

/* SKELETON */
.skeleton { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.shimmer-base {
  background: linear-gradient(90deg, var(--surface) 0%, rgba(180,77,255,0.07) 40%, #1a1a30 50%, rgba(180,77,255,0.07) 60%, var(--surface) 100%);
  background-size: 250% 100%; animation: shimmer 1.8s ease-in-out infinite;
}
.skeleton-img { aspect-ratio: 3/4; }
.skeleton-body { padding: 12px; }
.skeleton-line { height: 12px; border-radius: 6px; margin-bottom: 8px; }
.skeleton-line.short { width: 55%; }
.skeleton-tag { width: 40%; height: 9px; border-radius: 6px; margin-bottom: 14px; }

/* EMPTY */
.empty-state { text-align: center; padding: 70px 20px; color: var(--muted); display: none; }
.empty-state .icon { font-size: 52px; margin-bottom: 16px; }
.empty-state h3 { font-family: 'Outfit', sans-serif; font-size: 18px; margin-bottom: 8px; color: var(--text); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(8,8,15,0.92); backdrop-filter: blur(20px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-sheet {
  background: var(--surface); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px 24px 0 0; width: 100%; max-width: 500px;
  max-height: 92vh; overflow-y: auto;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  position: relative;
}
.modal-drag { width: 40px; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15); margin: 14px auto 0; }
.modal-img-wrap {
  aspect-ratio: 4/3; overflow: hidden; background: #0a0a18;
  margin: 16px 16px 0; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
}
.modal-img { width:100%; height:100%; object-fit:cover; display:none; border-radius:16px; }
.modal-img-placeholder { font-size:60px; display:none; }
.modal-body { padding: 20px; }
.modal-category {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
  background: linear-gradient(90deg, var(--v), var(--b));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.modal-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 20px; line-height: 1.3; margin-bottom: 8px; }
.modal-author { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.modal-stats { display: flex; gap: 16px; margin-bottom: 20px; }
.modal-stat { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); font-family: 'Space Mono', monospace; }

/* Copy btns */
.copy-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.copy-btn { padding: 14px 12px; border: none; border-radius: 12px; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 7px; }
.copy-btn-girl { background: linear-gradient(135deg, var(--p), var(--v)); color: #fff; box-shadow: 0 4px 16px rgba(255,77,206,0.3); }
.copy-btn-girl:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,77,206,0.5); }
.copy-btn-girl.copied { background: linear-gradient(135deg, #00e57d, #00b4ff); }
.copy-btn-boy { background: linear-gradient(135deg, var(--b), var(--v)); color: #fff; box-shadow: 0 4px 16px rgba(0,180,255,0.3); }
.copy-btn-boy:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,180,255,0.5); }
.copy-btn-boy.copied { background: linear-gradient(135deg, #00e57d, #00b4ff); }

/* Open AI Tool button */
.open-ai-btn {
  width: 100%; margin-bottom: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 14px;
  color: var(--text); font-family: 'Outfit', sans-serif;
  font-weight: 700; font-size: 14px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.open-ai-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(180,77,255,0.4); }

/* Action btns */
.action-btns { display: flex; gap: 10px; }
.action-btn {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px;
  padding: 13px; color: var(--text); font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 12px;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.action-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
.action-btn.like-action.liked { background: rgba(255,58,110,0.15); border-color: var(--r); color: var(--r); }

.modal-close {
  position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; color: var(--muted);
}
.modal-close:hover { background: rgba(255,255,255,0.15); }

/* Related */
.related-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px; margin: 24px 0 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.related-card { aspect-ratio:3/4; border-radius: 10px; overflow:hidden; cursor:pointer; background: var(--card); }
.related-card-img { width:100%; height:100%; object-fit:cover; }
.related-card-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:28px; }

/* AI TOOL POPUP */
.ai-popup-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.ai-popup-overlay.open { opacity: 1; pointer-events: all; }
.ai-popup-overlay.open .ai-popup-sheet { transform: translateY(0); }

.ai-popup-sheet {
  background: #13141f; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px 24px 0 0; width: 100%; max-width: 500px;
  padding: 20px 20px 36px;
  transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
}

.ai-popup-drag { width: 40px; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.12); margin: 0 auto 22px; }

.ai-popup-title {
  font-family: 'Outfit', sans-serif; font-weight: 800;
  font-size: 18px; margin-bottom: 20px; color: var(--text);
}

.ai-tool-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; border-radius: 16px; cursor: pointer;
  transition: all 0.2s; text-decoration: none; color: var(--text);
  margin-bottom: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
}
.ai-tool-item:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15); }

.ai-tool-icon {
  width: 50px; height: 50px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.ai-tool-icon.gemini { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(0,180,255,0.3); }
.ai-tool-icon.chatgpt { background: linear-gradient(135deg, #0d1117, #1a2332); border: 1px solid rgba(0,229,125,0.3); }

.ai-tool-info { flex: 1; }
.ai-tool-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 3px; }
.ai-tool-sub { font-size: 12px; color: var(--b); font-weight: 500; }
.ai-tool-arrow { color: var(--muted); font-size: 18px; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: rgba(20,20,40,0.95); border: 1px solid rgba(180,77,255,0.3); color: #fff;
  padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 600;
  font-family: 'Outfit', sans-serif; z-index: 999; opacity: 0; transition: all 0.3s ease;
  white-space: nowrap; pointer-events: none; box-shadow: 0 4px 20px rgba(180,77,255,0.2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* FOOTER */
footer { text-align: center; padding: 30px 20px 20px; border-top: 1px solid var(--border); position: relative; z-index: 1; }
.footer-logo {
  font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 18px; margin-bottom: 6px;
  background: linear-gradient(90deg, var(--r), var(--o), var(--y), var(--g), var(--b), var(--v), var(--p));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-size: 200%; animation: rainbowMove 4s linear infinite;
}
@keyframes rainbowMove { 0% { background-position: 0%; } 100% { background-position: 200%; } }
.footer-sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
.footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
.footer-links a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 12px; font-weight: 600; transition: color 0.2s; }
.footer-links a:hover { color: var(--text); }
.footer-copy { color: rgba(255,255,255,0.15); font-size: 11px; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">✦</div>
    <span class="nav-logo-text">Prompt Galaxy</span>
  </a>
  <div class="nav-right">
    <a href="upload.html" class="nav-upload-btn">✦ Upload</a>
    <div id="userAvatar" onclick="window.location.href='profile.html'"></div>
    <a href="login.html" class="nav-auth-btn" id="loginBtn">Login</a>
  </div>
</nav>

<!-- SEARCH (no hero) -->
<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search prompts, styles, artists...">
    <span class="search-clear" id="searchClear">✕</span>
  </div>
</div>

<!-- FILTERS — Suraj's replaced with Static -->
<div class="filters">
  <button class="filter-btn active" data-filter="all">✦ All</button>
  <button class="filter-btn" data-filter="trending">🔥 Trending</button>
  <button class="filter-btn" data-filter="cinematic">🎬 Cinematic</button>
  <button class="filter-btn" data-filter="4k">✨ 4K</button>
  <button class="filter-btn" data-filter="anime">🌸 Anime</button>
  <button class="filter-btn" data-filter="static">📸 Static</button>
</div>

<!-- MAIN SECTION -->
<div class="section">
  <div class="section-top">
    <div class="section-title">
      <div class="dot"></div>
      <span id="sectionTitle">All Prompts</span>
    </div>
    <div class="count-badge" id="countBadge">...</div>
  </div>

  <div class="grid" id="skeletonGrid">
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-tag shimmer-base"></div><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-tag shimmer-base"></div><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-tag shimmer-base"></div><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-tag shimmer-base"></div><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
  </div>

  <div class="grid" id="promptGrid" style="display:none"></div>
  <div class="empty-state" id="emptyState">
    <div class="icon">🌌</div>
    <h3>No prompts found</h3>
    <p>Try a different search or filter</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-drag"></div>
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div class="modal-img-wrap">
      <img class="modal-img" id="modalImg" src="" alt="">
      <div class="modal-img-placeholder" id="modalImgPlaceholder"></div>
    </div>
    <div class="modal-body">
      <div class="modal-category" id="modalCategory"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-author" id="modalAuthor"></div>
      <div class="modal-stats">
        <div class="modal-stat">❤️ <span id="likeCount">0</span></div>
        <div class="modal-stat">📋 <span id="copyCount">0</span></div>
      </div>
      <div class="copy-btns">
        <button class="copy-btn copy-btn-girl" id="copyGirlBtn" onclick="copyPrompt('girl')">
          <span>👩</span> Copy Girl Prompt
        </button>
        <button class="copy-btn copy-btn-boy" id="copyBoyBtn" onclick="copyPrompt('boy')">
          <span>👨</span> Copy Boy Prompt
        </button>
      </div>

      <!-- OPEN AI TOOL BUTTON -->
      <button class="open-ai-btn" onclick="openAiPopup()">
        🤖 Open in AI Tool
      </button>

      <div class="action-btns">
        <button class="action-btn like-action" id="likeBtn" onclick="toggleLike()">
          <span id="likeIcon">🤍</span> Like
        </button>
        <button class="action-btn" onclick="sharePrompt()">
          🔗 Share
        </button>
      </div>
      <div class="related-title">Related Prompts</div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>
  </div>
</div>

<!-- AI TOOL POPUP -->
<div class="ai-popup-overlay" id="aiPopupOverlay" onclick="closeAiPopup(event)">
  <div class="ai-popup-sheet">
    <div class="ai-popup-drag"></div>

    <a class="ai-tool-item" href="https://gemini.google.com/app" target="_blank" onclick="closeAiPopupDirect()">
      <div class="ai-tool-icon gemini">✦</div>

      <div class="ai-tool-icon chatgpt">🤖</div>
      <div class="ai-tool-info">
        <div class="ai-tool-name">ChatGPT</div>
        <div class="ai-tool-sub">Open in Browser</div>

</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhH_fplGM0SYhXYQyGEmSgsxchuUgi43I",
    authDomain: "surajfx2.firebaseapp.com",
    projectId: "surajfx2",
    storageBucket: "surajfx2.firebasestorage.app",
    messagingSenderId: "386646596801",
    appId: "1:386646596801:web:18bbb81f9d65ab79b28840"
  };

  const ADMIN_EMAIL = 'suraj@2.0'; // admin identifier
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let allPrompts = [];
  let currentPrompt = null;
  let currentFilter = 'all';

  // Auth — only admin can see Upload button
  onAuthStateChanged(auth, user => {
    const loginBtn = document.getElementById('loginBtn');
    const avatar = document.getElementById('userAvatar');
    const uploadBtn = document.querySelector('.nav-upload-btn');
    if (user) {
      loginBtn.style.display = 'none';
      avatar.style.display = 'flex';
      const name = user.displayName || user.email.split('@')[0];
      avatar.textContent = name[0].toUpperCase();
      // Hide upload button for non-admins
      const isAdmin = user.email === 'trendingeditday@gmail.com' || (user.displayName && user.displayName.toLowerCase().includes('suraj'));
      if (uploadBtn) uploadBtn.style.display = isAdmin ? '' : 'none';
    } else {
      loginBtn.style.display = '';
      avatar.style.display = 'none';
      if (uploadBtn) uploadBtn.style.display = 'none';
    }
  });

  async function loadPrompts() {
    try {
      const snap = await getDocs(collection(db, 'prompts'));
      allPrompts = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
    } catch (e) { allPrompts = []; }
    document.getElementById('skeletonGrid').style.display = 'none';
    document.getElementById('promptGrid').style.display = 'grid';
    renderPrompts(allPrompts);
  }

  function renderPrompts(list) {
    const grid = document.getElementById('promptGrid');
    const empty = document.getElementById('emptyState');
    document.getElementById('countBadge').textContent = `${list.length} prompts`;
    if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    const liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
    grid.innerHTML = list.map(p => `
      <div class="card" onclick="openModal('${p.id}')">
        <div class="card-img-wrap">
          ${p.imageUrl
            ? `<img class="card-img" src="${p.imageUrl}" alt="${p.title}" loading="lazy">`
            : `<div class="card-img-placeholder" style="background:${p.bg||'#11132a'}">${p.emoji||'🎨'}</div>`}
          <div class="card-category-tag">${p.category || 'Prompt'}</div>
          <div class="card-like-btn ${liked.includes(p.id)?'liked':''}" onclick="quickLike(event,'${p.id}',this)">
            ${liked.includes(p.id)?'❤️':'🤍'}
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${p.title}</div>
          <div class="card-meta">
            <div class="card-stats"><span>❤️ ${p.likes||0}</span><span>📋 ${p.copyCount||0}</span></div>
            <button class="see-prompt-btn">View</button>
          </div>
        </div>
      </div>
    `).join('');
    requestAnimationFrame(() => {
      document.querySelectorAll('.card').forEach((c, i) => setTimeout(() => c.classList.add('visible'), i * 50));
    });
  }

  window.quickLike = (e, id, btn) => {
    e.stopPropagation();
    const liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
    if (liked.includes(id)) {
      liked.splice(liked.indexOf(id), 1);
      btn.innerHTML = '🤍'; btn.classList.remove('liked');
    } else {
      liked.push(id); btn.innerHTML = '❤️'; btn.classList.add('liked');
      updateDoc(doc(db, 'prompts', id), { likes: increment(1) }).catch(() => {});
      showToast('Liked! ❤️');
    }
    localStorage.setItem('likedPrompts', JSON.stringify(liked));
  };

  window.openModal = (id) => {
    const p = allPrompts.find(x => x.id === id);
    if (!p) return;
    currentPrompt = p;
    document.getElementById('modalCategory').textContent = p.category || '';
    document.getElementById('modalTitle').textContent = p.title;
    document.getElementById('modalAuthor').textContent = `by ${p.author || 'Anonymous'}`;
    document.getElementById('likeCount').textContent = p.likes || 0;
    document.getElementById('copyCount').textContent = p.copyCount || 0;
    document.getElementById('copyGirlBtn').className = 'copy-btn copy-btn-girl';
    document.getElementById('copyGirlBtn').innerHTML = '<span>👩</span> Copy Girl Prompt';
    document.getElementById('copyBoyBtn').className = 'copy-btn copy-btn-boy';
    document.getElementById('copyBoyBtn').innerHTML = '<span>👨</span> Copy Boy Prompt';
    const liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
    document.getElementById('likeIcon').textContent = liked.includes(id) ? '❤️' : '🤍';
    document.getElementById('likeBtn').className = 'action-btn like-action' + (liked.includes(id) ? ' liked' : '');
    const img = document.getElementById('modalImg');
    const ph = document.getElementById('modalImgPlaceholder');
    if (p.imageUrl) { img.src = p.imageUrl; img.style.display = 'block'; ph.style.display = 'none'; }
    else { img.style.display = 'none'; ph.style.display = 'flex'; ph.style.background = p.bg || '#11132a'; ph.textContent = p.emoji || '🎨'; }
    const related = allPrompts.filter(x => x.id !== id && x.category === p.category).slice(0, 3);
    document.getElementById('relatedGrid').innerHTML = related.map(r => `
      <div class="related-card" onclick="openModal('${r.id}')">
        ${r.imageUrl ? `<img class="related-card-img" src="${r.imageUrl}" loading="lazy">` : `<div class="related-card-img-placeholder" style="background:${r.bg||'#11132a'}">${r.emoji||'🎨'}</div>`}
      </div>`).join('');
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    history.pushState({ modal: true, id }, '', '');
  };

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
  window.closeModal = () => {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
    if (history.state?.modal) history.back();
  };
  window.addEventListener('popstate', () => {
    const o = document.getElementById('modalOverlay');
    if (o.classList.contains('open')) { o.classList.remove('open'); document.body.style.overflow = ''; }
  });

  // AI Popup
  window.openAiPopup = () => {
    document.getElementById('aiPopupOverlay').classList.add('open');
  };
  window.closeAiPopup = (e) => {
    if (e.target === document.getElementById('aiPopupOverlay')) {
      document.getElementById('aiPopupOverlay').classList.remove('open');
    }
  };
  window.closeAiPopupDirect = () => {
    setTimeout(() => document.getElementById('aiPopupOverlay').classList.remove('open'), 200);
  };

  window.copyPrompt = (type) => {
    if (!currentPrompt) return;
    const text = type === 'girl' ? currentPrompt.girlPrompt : currentPrompt.boyPrompt;
    navigator.clipboard.writeText(text || '').catch(() => {});
    if (currentPrompt.id) updateDoc(doc(db, 'prompts', currentPrompt.id), { copyCount: increment(1) }).catch(() => {});
    const btn = document.getElementById(type === 'girl' ? 'copyGirlBtn' : 'copyBoyBtn');
    btn.classList.add('copied'); btn.innerHTML = '<span>✓</span> Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<span>${type==='girl'?'👩':'👨'}</span> Copy ${type==='girl'?'Girl':'Boy'} Prompt`;
    }, 2000);
    showToast('Prompt copied! 📋');
  };

  window.toggleLike = () => {
    if (!currentPrompt) return;
    const id = currentPrompt.id;
    const liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
    if (liked.includes(id)) {
      liked.splice(liked.indexOf(id), 1);
      document.getElementById('likeIcon').textContent = '🤍';
      document.getElementById('likeBtn').className = 'action-btn like-action';
      currentPrompt.likes = Math.max(0, (currentPrompt.likes || 0) - 1);
    } else {
      liked.push(id);
      document.getElementById('likeIcon').textContent = '❤️';
      document.getElementById('likeBtn').className = 'action-btn like-action liked';
      currentPrompt.likes = (currentPrompt.likes || 0) + 1;
      updateDoc(doc(db, 'prompts', id), { likes: increment(1) }).catch(() => {});
      showToast('Added to favourites ❤️');
    }
    document.getElementById('likeCount').textContent = currentPrompt.likes;
    localStorage.setItem('likedPrompts', JSON.stringify(liked));
  };

  window.sharePrompt = () => {
    if (!currentPrompt) return;
    if (navigator.share) navigator.share({ title: currentPrompt.title, text: 'Check out this AI prompt!', url: window.location.href });
    else { navigator.clipboard.writeText(window.location.href); showToast('Link copied! 🔗'); }
  };

  window.setFilter = (filter) => {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
    const titles = {
      all: 'All Prompts', trending: '🔥 Trending',
      cinematic: '🎬 Cinematic', '4k': '✨ 4K Image',
      anime: '🌸 Anime', static: '📸 Static'
    };
    document.getElementById('sectionTitle').textContent = titles[filter] || 'All Prompts';
    let filtered = allPrompts;
    if (filter === 'trending') filtered = [...allPrompts].sort((a, b) => (b.recentCopies || b.copyCount || 0) - (a.recentCopies || a.copyCount || 0));
    else if (filter === 'static') filtered = allPrompts.filter(p => (p.tags || [p.category]).includes('static') || p.category === 'static' || (p.tags || []).includes('Static') || p.category === 'Static');
    else if (filter !== 'all') filtered = allPrompts.filter(p => (p.tags || [p.category]).includes(filter) || p.category === filter);
    renderPrompts(filtered);
    window.scrollTo({ top: 100, behavior: 'smooth' });
  };

  document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => setFilter(btn.dataset.filter)));

  document.getElementById('searchInput').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    document.getElementById('searchClear').style.display = q ? 'block' : 'none';
    if (!q) { renderPrompts(allPrompts); return; }
    const filtered = allPrompts.filter(p => {
      const fields = [p.title, p.girlPrompt, p.boyPrompt, p.category, (p.tags || []).join(' '), p.author].map(f => (f || '').toLowerCase());
      return fields.some(f => f.includes(q));
    });
    renderPrompts(filtered);
  });

  document.getElementById('searchClear').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').style.display = 'none';
    renderPrompts(allPrompts);
  });

  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  loadPrompts();
</script>
</body>
