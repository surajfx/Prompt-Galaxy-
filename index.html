<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Galaxy — AI Image Prompts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #08080f; --surface: #0f1020; --card: #11132a;
  --border: rgba(255,255,255,0.07); --text: #f0f0ff; --muted: #5a5a80;
  --r: #ff3a6e; --o: #ff8c00; --y: #ffe600;
  --g: #00e57d; --b: #00b4ff; --v: #b44dff; --p: #ff4dce;
  --accent: #FFE234;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh; overflow-x: hidden;
  padding-bottom: 90px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 15%, rgba(180,77,255,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 25%, rgba(0,180,255,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 50% 80%, rgba(255,58,110,0.08) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 200;
  height: 58px; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(8,8,15,0.9); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
.nav-logo-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, var(--v), var(--b));
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px; color: #fff;
  box-shadow: 0 0 16px rgba(180,77,255,0.4);
}
.nav-logo-text {
  font-weight: 800; font-size: 16px;
  background: linear-gradient(90deg, var(--v), var(--b));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* SEARCH */
.search-section { padding: 16px 14px 8px; position: relative; z-index: 1; }
.search-wrap { max-width: 480px; width: 100%; margin: 0 auto; position: relative; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }
.search-clear { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); cursor: pointer; display: none; font-size: 17px; }
.search-input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(180,77,255,0.2); border-radius: 14px;
  padding: 13px 44px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 14px; outline: none; transition: all 0.2s;
}
.search-input:focus { border-color: rgba(180,77,255,0.5); background: rgba(255,255,255,0.07); box-shadow: 0 0 0 3px rgba(180,77,255,0.08); }
.search-input::placeholder { color: var(--muted); }

/* FILTERS */
.filters {
  display: flex; gap: 7px; padding: 10px 14px 16px;
  overflow-x: auto; scrollbar-width: none; position: relative; z-index: 1;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--muted); padding: 7px 14px; font-size: 12px;
  font-family: 'Outfit', sans-serif; font-weight: 600;
  cursor: pointer; border-radius: 100px; transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
}
.filter-btn.active { background: linear-gradient(135deg,var(--v),var(--b)); color:#fff; border-color:transparent; box-shadow:0 4px 14px rgba(180,77,255,0.35); }
.filter-btn:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: var(--text); }

/* SECTION */
.section { max-width: 1200px; margin: 0 auto; padding: 0 12px 30px; position: relative; z-index: 1; }
.section-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-weight: 800; font-size: 17px; display: flex; align-items: center; gap: 8px; }
.section-title .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: linear-gradient(135deg, var(--v), var(--b));
  box-shadow: 0 0 8px rgba(180,77,255,0.7);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); opacity:0.7; } }
.count-badge {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--muted); font-size: 10px; font-family: 'Space Mono', monospace;
  padding: 3px 9px; border-radius: 100px;
}

/* GRID */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); } }

/* CARD */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; cursor: pointer;
  transition: all 0.28s ease; opacity: 0;
}
.card.visible { animation: cardPop 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes cardPop { from { opacity:0; transform: translateY(18px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }
.card:hover { transform: translateY(-4px); border-color: rgba(180,77,255,0.3); box-shadow: 0 12px 32px rgba(180,77,255,0.15); }
.card-img-wrap { position: relative; aspect-ratio: 3/4; overflow: hidden; background: var(--surface); }
.card-img { width:100%; height:100%; object-fit:cover; transition: transform 0.4s ease; display:block; }
.card:hover .card-img { transform: scale(1.06); }
.card-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:40px; }
.card-category-tag {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
  font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  padding: 3px 7px; border-radius: 5px; color: var(--accent);
}
.card-like-btn {
  position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px;
}
.card-like-btn.liked { background: rgba(255,50,50,0.25); border-color: var(--r); }
.card-body { padding: 10px; }
.card-title { font-weight: 600; font-size: 12px; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; justify-content: space-between; }
.card-stats { display: flex; gap: 7px; font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }
.see-prompt-btn {
  background: rgba(180,77,255,0.12); border: 1px solid rgba(180,77,255,0.3);
  color: var(--v); padding: 4px 9px; font-size: 10px;
  font-weight: 700; cursor: pointer; border-radius: 6px;
}

/* SKELETON */
.skeleton { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.shimmer-base {
  background: linear-gradient(90deg, var(--surface) 0%, rgba(180,77,255,0.06) 50%, var(--surface) 100%);
  background-size: 250% 100%; animation: shimmer 1.8s ease-in-out infinite;
}
.skeleton-img { aspect-ratio: 3/4; }
.skeleton-body { padding: 10px; }
.skeleton-line { height: 11px; border-radius: 5px; margin-bottom: 7px; }
.skeleton-line.short { width: 55%; }

/* EMPTY */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); display: none; }
.empty-state .icon { font-size: 48px; margin-bottom: 14px; }
.empty-state h3 { font-weight: 800; font-size: 17px; margin-bottom: 6px; color: var(--text); }

/* ====== BOTTOM NAV ====== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: rgba(11,11,20,0.97); backdrop-filter: blur(28px);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: space-around;
  padding: 10px 10px 18px;
  height: 80px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
  flex: 1; position: relative;
}
.nav-item-icon {
  width: 44px; height: 44px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: all 0.25s;
  color: #555580;
}
.nav-item.active .nav-item-icon {
  background: var(--accent); border-radius: 14px;
  color: #000; font-size: 21px;
  box-shadow: 0 4px 16px rgba(255,226,52,0.35);
}
.nav-item-label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  transition: color 0.2s;
}
.nav-item.active .nav-item-label { color: var(--accent); }

/* NAV ICONS (SVG-style) */
.icon-home::before { content: '⌂'; font-size: 22px; }
.icon-collections::before { content: '⊞'; font-size: 20px; }
.icon-explore::before { content: '⊡'; font-size: 20px; }
.icon-liked::before { content: '♥'; font-size: 20px; }

/* ====== CARD DETAIL PAGE (full screen overlay) ====== */
.detail-overlay {
  position: fixed; inset: 0; z-index: 400;
  background: var(--bg);
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
}
.detail-overlay.open { transform: translateX(0); }

.detail-nav {
  position: sticky; top: 0; z-index: 10;
  height: 56px; padding: 0 16px;
  display: flex; align-items: center; gap: 12px;
  background: rgba(8,8,15,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.detail-back {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.07); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--text);
}
.detail-nav-title { font-weight: 700; font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.detail-img-wrap {
  width: 100%; aspect-ratio: 4/3; overflow: hidden;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
}
.detail-img { width:100%; height:100%; object-fit:cover; }
.detail-img-placeholder { font-size: 80px; }

.detail-body { padding: 20px 16px 100px; }
.detail-category {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 8px;
}
.detail-title { font-weight: 800; font-size: 22px; line-height: 1.3; margin-bottom: 6px; }
.detail-author { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

/* STATS ROW */
.detail-stats {
  display: flex; gap: 16px; margin-bottom: 20px;
  padding: 12px 16px; background: rgba(255,255,255,0.03);
  border: 1px solid var(--border); border-radius: 14px;
}
.detail-stat { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); font-family: 'Space Mono', monospace; }
.detail-stat span { color: var(--text); font-weight: 600; }

/* GET PROMPT BUTTON */
.get-prompt-btn {
  width: 100%; padding: 18px;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 16px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 17px;
  cursor: pointer; transition: all 0.2s; margin-bottom: 14px;
  letter-spacing: 0.3px;
}
.get-prompt-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.2); }

/* ACTION ROW */
.detail-actions { display: flex; gap: 10px; margin-bottom: 24px; }
.action-btn {
  flex: 1; padding: 14px 10px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 14px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.action-btn:hover { background: rgba(255,255,255,0.09); }
.action-btn.liked { background: rgba(255,58,110,0.15); border-color: var(--r); color: var(--r); }
.action-btn.share-btn { background: rgba(0,180,255,0.08); border-color: rgba(0,180,255,0.25); color: var(--b); }

/* RELATED */
.related-title { font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.related-card { aspect-ratio:3/4; border-radius: 10px; overflow:hidden; cursor:pointer; background: var(--card); }
.related-card-img { width:100%; height:100%; object-fit:cover; }
.related-card-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:26px; }

/* ====== PROMPT SHEET ====== */
.prompt-sheet-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.prompt-sheet-overlay.open { opacity: 1; pointer-events: all; }
.prompt-sheet {
  background: #13141f; border: 1px solid rgba(255,255,255,0.09);
  border-radius: 24px 24px 0 0; width: 100%; max-width: 520px;
  padding: 0 0 36px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
  max-height: 92vh; overflow-y: auto;
}
.prompt-sheet-overlay.open .prompt-sheet { transform: translateY(0); }
.sheet-drag { width: 40px; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.12); margin: 14px auto 20px; }
.sheet-title { font-weight: 800; font-size: 17px; padding: 0 20px 16px; }
.prompt-version-card {
  margin: 0 16px 14px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; overflow: hidden;
}
.pvc-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 10px;
  font-weight: 700; font-size: 14px;
}
.copy-prompt-btn {
  width: calc(100% - 32px); margin: 0 16px 8px;
  padding: 14px; border: none; border-radius: 12px;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.copy-girl { background: linear-gradient(135deg, #ff4dce, #b44dff); color: #fff; box-shadow: 0 4px 14px rgba(255,77,206,0.3); }
.copy-boy  { background: linear-gradient(135deg, #00b4ff, #b44dff); color: #fff; box-shadow: 0 4px 14px rgba(0,180,255,0.3); }
.copy-prompt-btn.copied { background: linear-gradient(135deg, #00e57d, #00b4ff); }
.prompt-text-preview {
  padding: 0 16px 14px;
  font-family: 'Space Mono', monospace; font-size: 11px;
  color: var(--muted); line-height: 1.7;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
}

/* ====== SHARE POPUP ====== */
.share-overlay {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.share-overlay.open { opacity: 1; pointer-events: all; }
.share-sheet {
  background: #13141f; border: 1px solid rgba(255,255,255,0.09);
  border-radius: 24px 24px 0 0; width: 100%; max-width: 520px;
  padding: 0 20px 36px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
}
.share-overlay.open .share-sheet { transform: translateY(0); }
.share-title { font-weight: 800; font-size: 17px; margin-bottom: 18px; }
.share-apps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.share-app {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  cursor: pointer; transition: all 0.2s;
}
.share-app:active { transform: scale(0.92); }
.share-app-icon {
  width: 56px; height: 56px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; border: 1px solid rgba(255,255,255,0.08);
}
.share-app-label { font-size: 11px; font-weight: 600; color: var(--muted); text-align: center; }
.share-app-insta .share-app-icon { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.share-app-whatsapp .share-app-icon { background: #25d366; }
.share-app-twitter .share-app-icon { background: #000; border-color: rgba(255,255,255,0.15); }
.share-app-copy .share-app-icon { background: rgba(255,255,255,0.06); }

.share-link-row {
  display: flex; gap: 8px; align-items: center;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;
}
.share-link-url { flex: 1; font-size: 12px; font-family: 'Space Mono', monospace; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.share-copy-link-btn {
  background: var(--accent); color: #000; border: none;
  padding: 7px 14px; border-radius: 8px;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer;
}
.share-close-btn {
  width: 100%; padding: 15px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  border-radius: 14px; color: var(--muted);
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer;
}

/* TOAST */
.toast {
  position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15); color: var(--text);
  padding: 12px 20px; border-radius: 100px;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  opacity: 0; transition: all 0.3s; z-index: 700; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-icon">✦</div>
    <div class="nav-logo-text">Prompt Galaxy</div>
  </a>
</nav>

<!-- SEARCH -->
<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Search prompts, styles, vibes...">
    <span class="search-clear" id="searchClear">✕</span>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" data-filter="all">✨ All</button>
  <button class="filter-btn" data-filter="trending">🔥 Trending</button>
  <button class="filter-btn" data-filter="cinematic">🎬 Cinematic</button>
  <button class="filter-btn" data-filter="4k">🌟 4K</button>
  <button class="filter-btn" data-filter="anime">🌸 Anime</button>
  <button class="filter-btn" data-filter="portrait">👤 Portrait</button>
  <button class="filter-btn" data-filter="fantasy">🔮 Fantasy</button>
  <button class="filter-btn" data-filter="static">📸 Static</button>
</div>

<!-- SECTION -->
<div class="section">
  <div class="section-top">
    <div class="section-title"><div class="dot"></div><span id="sectionTitle">All Prompts</span></div>
    <div class="count-badge" id="countBadge">loading...</div>
  </div>

  <!-- SKELETON -->
  <div class="grid" id="skeletonGrid">
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
    <div class="skeleton"><div class="skeleton-img shimmer-base"></div><div class="skeleton-body"><div class="skeleton-line shimmer-base"></div><div class="skeleton-line short shimmer-base"></div></div></div>
  </div>
  <div class="grid" id="promptGrid" style="display:none"></div>
  <div class="empty-state" id="emptyState">
    <div class="icon">🔍</div>
    <h3>No prompts found</h3>
    <p>Try a different search or filter</p>
  </div>
</div>

<!-- ====== CARD DETAIL PAGE ====== -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-nav">
    <div class="detail-back" onclick="closeDetail()">←</div>
    <div class="detail-nav-title" id="detailNavTitle"></div>
  </div>

  <div class="detail-img-wrap">
    <img class="detail-img" id="detailImg" src="" alt="" style="display:none">

  <div class="detail-body">
    <div class="detail-category" id="detailCategory"></div>
    <div class="detail-title" id="detailTitle"></div>

    <div class="detail-stats">
      <div class="detail-stat">❤️ <span id="dLikes">0</span></div>
      <div class="detail-stat">👁️ <span id="dViews">0</span></div>
      <div class="detail-stat">📋 <span id="dCopies">0</span></div>
    </div>

    <button class="get-prompt-btn" onclick="openPromptSheet()">Get Prompt</button>

  <div class="share-sheet">
    <div class="sheet-drag"></div>

    <div class="share-apps">
      <div class="share-app share-app-insta" onclick="shareToInsta()">
        <div class="share-app-icon">📸</div>
        <div class="share-app-label">Instagram</div>
      </div>
      <div class="share-app share-app-whatsapp" onclick="shareToWhatsApp()">
        <div class="share-app-icon">💬</div>
        <div class="share-app-label">WhatsApp</div>
      </div>
      <div class="share-app share-app-twitter" onclick="shareToTwitter()">
        <div class="share-app-icon" style="color:#fff">𝕏</div>

</div>

    <div class="nav-item-icon">♥</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDhH_fplGM0SYhXYQyGEmSgsxchuUgi43I",
  authDomain: "surajfx2.firebaseapp.com",
  projectId: "surajfx2",
  storageBucket: "surajfx2.firebasestorage.app",
  messagingSenderId: "386646596801",
  appId: "1:386646596801:web:18bbb81f9d65ab79b28840"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allPrompts = [];
let currentPrompt = null;
let currentFilter = 'all';

async function loadPrompts() {
  try {
    const snap = await db.collection('prompts').get();
    allPrompts = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
  } catch (e) { console.error(e); allPrompts = []; }
  document.getElementById('skeletonGrid').style.display = 'none';
  document.getElementById('promptGrid').style.display = 'grid';
  renderPrompts(allPrompts);

  const hash = window.location.hash.replace('#', '');
  if (hash) {
    const p = allPrompts.find(x => x.id === hash);
    if (p) openDetail(hash);
  }
}

function renderPrompts(list) {
  const grid = document.getElementById('promptGrid');
  const empty = document.getElementById('emptyState');
  document.getElementById('countBadge').textContent = list.length + ' prompts';
  if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
  grid.innerHTML = list.map(p => {
    const isLiked = liked.includes(p.id);
    return '<div class="card" data-id="' + p.id + '">' +
      '<div class="card-img-wrap">' +
      (p.imageUrl
        ? '<img class="card-img" src="' + p.imageUrl + '" alt="" loading="lazy">'
        : '<div class="card-img-placeholder" style="background:' + (p.bg||'#11132a') + '">' + (p.emoji||'🎨') + '</div>') +
      '<div class="card-category-tag">' + (p.category||'Prompt') + '</div>' +
      '<div class="card-like-btn ' + (isLiked?'liked':'') + '" data-like-id="' + p.id + '">' + (isLiked?'❤️':'🤍') + '</div>' +
      '</div>' +
      '<div class="card-body">' +
      '<div class="card-title">' + p.title + '</div>' +
      '<div class="card-meta">' +
      '<div class="card-stats"><span>❤️ ' + (p.likes||0) + '</span><span>📋 ' + (p.copyCount||0) + '</span></div>' +
      '<div class="see-prompt-btn">View</div>' +
      '</div></div></div>';
  }).join('');
  // Attach click events after render
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', function() { openDetail(this.dataset.id); });
  });
  grid.querySelectorAll('.card-like-btn').forEach(btn => {
    btn.addEventListener('click', function(e) { e.stopPropagation(); quickLike(this.dataset.likeId, this); });
  });
  requestAnimationFrame(() => {
    document.querySelectorAll('.card').forEach((c, i) => setTimeout(() => c.classList.add('visible'), i * 40));
  });
}

function openDetail(id) {
  const p = allPrompts.find(x => x.id === id);
  if (!p) return;
  currentPrompt = p;

  document.getElementById('detailNavTitle').textContent = p.title;
  document.getElementById('detailCategory').textContent = p.category || '';
  document.getElementById('detailTitle').textContent = p.title;
  document.getElementById('detailAuthor').textContent = 'by ' + (p.author || 'Anonymous');
  document.getElementById('dLikes').textContent = p.likes || 0;
  document.getElementById('dViews').textContent = p.views || 0;
  document.getElementById('dCopies').textContent = p.copyCount || 0;

  const img = document.getElementById('detailImg');
  const ph = document.getElementById('detailImgPh');
  if (p.imageUrl) { img.src = p.imageUrl; img.style.display = 'block'; ph.style.display = 'none'; }
  else { img.style.display = 'none'; ph.style.display = 'flex'; ph.textContent = p.emoji || '🎨'; }

  const liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
  document.getElementById('detailLikeIcon').textContent = liked.includes(id) ? '❤️' : '🤍';
  document.getElementById('detailLikeBtn').className = 'action-btn' + (liked.includes(id) ? ' liked' : '');

  // Related cards (same category)
  const related = allPrompts.filter(x => x.id !== id && x.category === p.category).slice(0, 3);
  const relGrid = document.getElementById('relatedGrid');
  relGrid.innerHTML = related.map(r =>
    '<div class="related-card" data-id="' + r.id + '">' +
    (r.imageUrl ? '<img class="related-card-img" src="' + r.imageUrl + '" loading="lazy">' : '<div class="related-card-ph" style="background:' + (r.bg||'#11132a') + '">' + (r.emoji||'🎨') + '</div>') +
    '</div>'
  ).join('');
  relGrid.querySelectorAll('.related-card').forEach(card => {
    card.addEventListener('click', function() { openDetail(this.dataset.id); });
  });

  // More prompts YouTube style
  const moreList = allPrompts.filter(x => x.id !== id).slice(0, 8);
  const likedArr = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
  const moreGrid = document.getElementById('morePromptsGrid');
  moreGrid.innerHTML = moreList.map(m =>
    '<div class="card" data-id="' + m.id + '" style="opacity:1">' +
    '<div class="card-img-wrap">' +
    (m.imageUrl ? '<img class="card-img" src="' + m.imageUrl + '" loading="lazy">' : '<div class="card-img-placeholder" style="background:' + (m.bg||'#11132a') + '">' + (m.emoji||'🎨') + '</div>') +
    '<div class="card-category-tag">' + (m.category||'Prompt') + '</div>' +
    '</div><div class="card-body"><div class="card-title">' + m.title + '</div>' +
    '<div class="card-meta"><div class="card-stats"><span>❤️ ' + (m.likes||0) + '</span><span>📋 ' + (m.copyCount||0) + '</span></div>' +
    '<div class="see-prompt-btn">View</div></div></div></div>'
  ).join('');
  moreGrid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', function() { openDetail(this.dataset.id); });
  });

  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  window.location.hash = id;

  // Views - once per device
  const viewedKey = 'viewed_' + id;
  if (!localStorage.getItem(viewedKey)) {
    localStorage.setItem(viewedKey, '1');
    db.collection('prompts').doc(id).update({ views: firebase.firestore.FieldValue.increment(1) }).catch(() => {});
  }
}
window.openDetail = openDetail;

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
  history.replaceState(null, '', window.location.pathname);
  closePromptSheet();
  closeSharePopup();
}
window.closeDetail = closeDetail;

function quickLike(id, btn) {
  const liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
  if (liked.includes(id)) {
    liked.splice(liked.indexOf(id), 1);
    btn.innerHTML = '🤍'; btn.classList.remove('liked');
  } else {
    liked.push(id); btn.innerHTML = '❤️'; btn.classList.add('liked');
    db.collection('prompts').doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) }).catch(() => {});
    showToast('Added to Liked ❤️');
  }
  localStorage.setItem('likedPrompts', JSON.stringify(liked));
}
window.quickLike = quickLike;

function toggleDetailLike() {
  if (!currentPrompt) return;
  const id = currentPrompt.id;
  const liked = JSON.parse(localStorage.getItem('likedPrompts') || '[]');
  const likeBtn = document.getElementById('detailLikeBtn');
  if (liked.includes(id)) {
    liked.splice(liked.indexOf(id), 1);
    document.getElementById('detailLikeIcon').textContent = '🤍';
    likeBtn.className = 'action-btn';
    currentPrompt.likes = Math.max(0, (currentPrompt.likes || 0) - 1);
  } else {
    liked.push(id);
    document.getElementById('detailLikeIcon').textContent = '❤️';
    likeBtn.className = 'action-btn liked';
    currentPrompt.likes = (currentPrompt.likes || 0) + 1;
    db.collection('prompts').doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) }).catch(() => {});
    showToast('Added to Liked ❤️');
  }
  document.getElementById('dLikes').textContent = currentPrompt.likes;
  localStorage.setItem('likedPrompts', JSON.stringify(liked));
}
window.toggleDetailLike = toggleDetailLike;

function openPromptSheet() {
  if (!currentPrompt) return;
  document.getElementById('girlPreview').textContent = currentPrompt.girlPrompt || 'No girl prompt added.';
  document.getElementById('boyPreview').textContent = currentPrompt.boyPrompt || 'No boy prompt added.';
  document.getElementById('promptSheetOverlay').classList.add('open');
}
window.openPromptSheet = openPromptSheet;

function closePromptSheet() {
  document.getElementById('promptSheetOverlay').classList.remove('open');
}
window.closePromptSheet = closePromptSheet;

function copyPromptText(type) {
  if (!currentPrompt) return;
  const text = type === 'girl' ? currentPrompt.girlPrompt : currentPrompt.boyPrompt;
  navigator.clipboard.writeText(text || '').catch(() => {});
  if (currentPrompt.id) db.collection('prompts').doc(currentPrompt.id).update({ copyCount: firebase.firestore.FieldValue.increment(1) }).catch(() => {});
  const btn = document.getElementById(type === 'girl' ? 'copyGirlBtn' : 'copyBoyBtn');
  btn.classList.add('copied'); btn.textContent = '✓ Copied!';
  showToast('Prompt copied! 📋');
  setTimeout(() => {
    btn.classList.remove('copied');
    btn.innerHTML = '📋 Copy ' + (type === 'girl' ? 'Girl' : 'Boy') + ' Prompt';
  }, 2000);
  const copies = parseInt(document.getElementById('dCopies').textContent) + 1;
  document.getElementById('dCopies').textContent = copies;
}
window.copyPromptText = copyPromptText;

function openSharePopup() {
  if (!currentPrompt) return;
  const url = window.location.origin + window.location.pathname + '#' + currentPrompt.id;
  document.getElementById('shareLinkUrl').textContent = url;
  document.getElementById('shareOverlay').classList.add('open');
}
window.openSharePopup = openSharePopup;

function closeSharePopup() {
  document.getElementById('shareOverlay').classList.remove('open');
}
window.closeSharePopup = closeSharePopup;

function getShareUrl() {
  if (!currentPrompt) return '';
  return window.location.origin + window.location.pathname + '#' + currentPrompt.id;
}

function shareToInsta() {
  navigator.clipboard.writeText(getShareUrl()).catch(() => {});
  showToast('Link copied! Paste in Instagram 📸');
  window.location.href = 'instagram://';
  setTimeout(() => window.open('https://www.instagram.com', '_blank'), 500);
}
window.shareToInsta = shareToInsta;

function shareToWhatsApp() {
  if (!currentPrompt) return;
  window.open('https://wa.me/?text=' + encodeURIComponent('Check out this AI prompt: ' + currentPrompt.title + '\n' + getShareUrl()), '_blank');
  closeSharePopup();
}
window.shareToWhatsApp = shareToWhatsApp;

function shareToTwitter() {
  if (!currentPrompt) return;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent('Check out: ' + currentPrompt.title) + '&url=' + encodeURIComponent(getShareUrl()), '_blank');
  closeSharePopup();
}
window.shareToTwitter = shareToTwitter;

function shareMore() {
  if (!currentPrompt) return;
  if (navigator.share) {
    navigator.share({ title: currentPrompt.title, text: 'Check out this AI prompt!', url: getShareUrl() });
  } else {
    navigator.clipboard.writeText(getShareUrl()).catch(() => {});
    showToast('Link copied! 🔗');
  }
  closeSharePopup();
}
window.shareMore = shareMore;

function copyShareLink() {
  navigator.clipboard.writeText(getShareUrl()).catch(() => {});
  showToast('Link copied! 🔗');
}
window.copyShareLink = copyShareLink;

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  const titles = { all: 'All Prompts', trending: '🔥 Trending', cinematic: '🎬 Cinematic', '4k': '🌟 4K Image', anime: '🌸 Anime', portrait: '👤 Portrait', fantasy: '🔮 Fantasy', static: '📸 Static' };
  document.getElementById('sectionTitle').textContent = titles[filter] || 'All Prompts';
  let filtered = allPrompts;
  if (filter === 'trending') {
    const now = Date.now();
    const sevenDays = 7 * 24 * 60 * 60 * 1000;
    filtered = [...allPrompts].sort((a, b) => {
      const aScore = (a.copyCount||0) + (a.likes||0)*0.5;
      const bScore = (b.copyCount||0) + (b.likes||0)*0.5;
      return bScore - aScore;
    });
  } else if (filter !== 'all') {
    filtered = allPrompts.filter(p => (p.category || '').toLowerCase() === filter || ((p.tags || []).map(t => t.toLowerCase()).includes(filter)));
  }
  renderPrompts(filtered);
  window.scrollTo({ top: 100, behavior: 'smooth' });
}
window.setFilter = setFilter;

document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => setFilter(btn.dataset.filter)));

document.getElementById('searchInput').addEventListener('input', function () {
  const q = this.value.toLowerCase();
  document.getElementById('searchClear').style.display = q ? 'block' : 'none';
  if (!q) { renderPrompts(allPrompts); return; }
  const filtered = allPrompts.filter(p => {
    const fields = [p.title, p.girlPrompt, p.boyPrompt, p.category, (p.tags || []).join(' ')].map(f => (f || '').toLowerCase());
    return fields.some(f => f.includes(q));
  });
  renderPrompts(filtered);
});
document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  renderPrompts(allPrompts);
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
window.showToast = showToast;

window.addEventListener('popstate', () => {
  const d = document.getElementById('detailOverlay');
  if (d.classList.contains('open')) closeDetail();
});

loadPrompts();
</script>
